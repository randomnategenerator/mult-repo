<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Playground</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Add your CSS library links here -->
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    </script>

</head>

<body>
    <section id="image-movement">
        <h2>Section 1: Image Movement</h2>
        <button class="arrow-buttons" id="up-button" type="button">U</button>
        <div id="falcon-section">
            <button class="arrow-buttons" id="left-button" type="button">L</button>
            <img id='falcon-gif' src="assets/falcon-center.gif">
            <button class="arrow-buttons" id="right-button" type="button">R</button>
        </div>
        <button class="arrow-buttons" id="down-button" type="button">D</button>
    </section>

    <section id="interactive-trivia">
        <h2>Section 2: Interactive Trivia Question</h2>
        <h2>Why Did the Chicken Cross the Road?</h2>
        <div id="trivia-buttons">
            <button id="correct-answer">To Get to the Other Side</button>
            <button class="wrong-answer">To Get To the KFC</button>
            <button class="wrong-answer">ediS rehtO eht ot teG oT</button>
            <button class="wrong-answer">idk</button>
        </div>
    </section>

    <section id="scroll-activated-image">
        <h2>Section 3: Scroll-Activated Image Movement</h2>
        <!-- Add your scroll-activated image here -->
    </section>

    <section id="choose-your-own-adventure">
        <h2>Section 4: Choose-Your-Own-Adventure</h2>
        <!-- This is your creative space! -->
    </section>

    <script src="scripts.js"></script>

    <!-- Remember to add your JavaScript file link here if you create one -->
</body>

</html>
